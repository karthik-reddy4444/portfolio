<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body, html {
            height: 100%;
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
        }

        .bg-image {
            margin-left: 650px;
            top: 26.6%;
            height: 390px;
            width: 541px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .form-container {
            background-image: url(\portfolio\mr.kk1.jpg);
            opacity: .5;
            position: absolute;
            width: 500px;
            height: 350px;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(255, 255, 255, 0.8);
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5);
        }
        .form-container h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        .form-container input[type="text"], .form-container input[type="password"] {
            width: 100%;
            height: 50px;
            padding: 10px;
            margin: 10px 0 20px 0;
            display: inline-block;
            border: 1px solid #ccc;
            box-sizing: border-box;
            border-radius: 5px;
        }
        .form-container button {
            background-color: #4CAF50;
            color: white;
            padding: 14px 20px;
            margin: 8px 0;
            border: none;
            cursor: pointer;
            width: 100%;
            height: 70px;
            border-radius: 5px;
        }
        .form-container button:hover {
           background-color: rgb(13, 193, 224);
           opacity: .5;
        }
    </style>
</head>
<body>
    <img  class="bg-image" src="\portfolio\mr.kk1.jpg" alt="bg image ">
        <div class="form-container">
            <h2>Login</h2>
            <form id="loginForm">
                <label for="uname"><b>Username</b></label><br>
                <input type="text" placeholder="Enter your name" name="uname" required><br>

                <label for="psw"><b>Password</b></label><br>
                <input type="password" placeholder="Enter your name" name="psw" required><br>

                <button type="submit">Login</button>
            </form>
        </div>
    
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(event) {
            event.preventDefault(); 
            window.location.href = 'branch.html'; 
        });
    </script>
</body>
</html>
